spring.application.name=spbs-backend
server.address=0.0.0.0

# ── PostgreSQL ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://ep-fragrant-cell-amrjt93j-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_bGvps42djtlY
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
# update = Hibernate creates / alters tables automatically from entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# IMPORTANT: defer SQL init until after Hibernate has created the schema
spring.jpa.defer-datasource-initialization=true

# ── SQL Init ─────────────────────────────────────────────────────
# none = we rely on DataInitializer (CommandLineRunner) for seed data
spring.sql.init.mode=never

# ── Session ──────────────────────────────────────────────────────
server.servlet.session.timeout=60m

# ── CORS allowed origin ──────────────────────────────────────────
app.cors.allowed-origin=http://student-performance-benchmarking-sy-brown.vercel.app

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.spbs=INFO
logging.level.org.springframework.security=WARN

server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true
